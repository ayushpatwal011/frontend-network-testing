<div class="row g-4 h-100 pb-4">
    <!-- Sidebar for Stats/List (Left) -->
    <div class="col-12 col-xl-4 d-flex flex-column gap-3">

        <!-- Hero Card -->
        <div class="card glass-card border-0 shadow-sm"
            style="background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%);">
            <div class="card-body text-white">
                <h4 class="fw-bold mb-1"><i class="bi bi-activity"></i> Network Dashboard</h4>
                <p class="mb-0 text-white-50 small">Overview of connected cellular towers & metrics</p>
            </div>
        </div>

        <!-- Stats Grid -->
        <div class="row g-3">
            <div class="col-6">
                <div class="card glass-card border-0 shadow-sm h-100 hover-lift">
                    <div class="card-body text-center py-4">
                        <h5 class="text-muted mb-2"><i class="bi bi-broadcast"></i> Total</h5>
                        <h2 class="fw-bold text-primary mb-0">{{ towers.length }}</h2>
                    </div>
                </div>
            </div>
            <div class="col-6">
                <div class="card glass-card border-0 shadow-sm h-100 hover-lift">
                    <div class="card-body text-center py-4">
                        <h5 class="text-muted mb-2"><i class="bi bi-check-circle-fill text-success"></i> Good</h5>
                        <h2 class="fw-bold text-success mb-0">{{ getGoodTowersCount() }}</h2>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tower Management Link -->
        <div class="card glass-card border-0 shadow-sm hover-lift mt-2" [routerLink]="['/towers']"
            style="cursor: pointer;">
            <div class="card-body d-flex justify-content-between align-items-center p-4">
                <div>
                    <h5 class="fw-bold mb-1 text-primary"><i class="bi bi-list-ul me-2"></i> All Towers List</h5>
                    <p class="mb-0 text-muted small">View paginated list, search and filter capabilities</p>
                </div>
                <i class="bi bi-chevron-right fs-4 text-primary"></i>
            </div>
        </div>
    </div>

    <!-- Map Area (Right) -->
    <div class="col-12 col-xl-8" style="min-height: 500px;">
        <div class="card glass-card border-0 shadow-sm h-100 overflow-hidden position-relative p-1">
            <!-- The Map Target -->
            <div id="ol-map" class="w-100 h-100 rounded" style="border-radius: 10px !important;"></div>

            <!-- Overlays, e.g. a simple legend -->
            <div
                class="position-absolute bottom-0 start-0 m-3 p-2 bg-white rounded shadow-sm opacity-75 d-flex gap-3 px-3">
                <small class="d-flex align-items-center"><span class="bg-success rounded-circle me-1"
                        style="width: 10px; height: 10px; display:inline-block;"></span> Good</small>
                <small class="d-flex align-items-center"><span class="bg-warning rounded-circle me-1"
                        style="width: 10px; height: 10px; display:inline-block;"></span> Avg</small>
                <small class="d-flex align-items-center"><span class="bg-danger rounded-circle me-1"
                        style="width: 10px; height: 10px; display:inline-block;"></span> Poor</small>
            </div>
        </div>
    </div>
</div>
